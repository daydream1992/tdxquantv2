# QuestDB 自定义配置（可选，覆盖默认值）
# 文档: https://questdb.io/docs/reference/configuration/

# 共享 worker 线程数（建议 = CPU 核数 / 2）
shared.worker.count=2

# 时区
timezone=Asia/Shanghai

# HTTP 服务器
http.net.bind.to=0.0.0.0:9000
http.net.idle.timeout=300s

# PG wire 服务器
pg.net.bind.to=0.0.0.0:8812
pg.net.idle.timeout=300s

# ILP 服务器（InfluxDB line protocol）
line.tcp.net.bind.to=0.0.0.0:9009

# 日志
log.level=INFO

# 数据目录
cairo.sql.folder=/var/lib/questdb/db
cairo.wal.folder=/var/lib/questdb/wal
