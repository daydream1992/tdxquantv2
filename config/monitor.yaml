# TdxQuant 监控配置（合并自 monitor_rules.yaml + match_strategies.yaml）
#
# 4 段结构：
#   1. monitor           —— 监控运行参数（订阅/轮询/防抖/聚合/交易时段/健康度/板块热度/同板块联动）
#   2. alert_templates   —— L1 零件库：告警模板（condition + channels + default_params）
#   3. dedup             —— 告警去重配置（key_fields + bypass_priority）
#   4. match_strategies  —— L2 装配单：将 alert_templates 按 strategy_id 装配成套餐
#
# 三层模型（PLAN §14.2）：
#   L1 alert_templates   → 零件库（本文件 alert_templates 段，RuleSet 加载）
#   L2 match_strategies  → 装配单（本文件 match_strategies 段，MatchRegistry 加载）
#   L3 MonitorEngine     → 执行手（on_quote 按 snap.strategy_id 取 match）
#
# ConfigLoader 按 alphabetical 加载 config/*.yaml，本文件（monitor.yaml）后于 app.yaml
# 加载，故 monitor.* 配置不会被 app.yaml 覆盖。
# 修改后调 POST /api/config/reload 热加载，前端按 enabled 字段决定是否显示。

# ============================================================================
# 1. monitor 段：监控运行参数
# ============================================================================
monitor:
  subscribe_batch_size: 50
  poll_interval_seconds: 10
  alert_debounce_seconds: 30
  alert_aggregate_window_seconds: 60
  alert_aggregate_max_size: 10
  trading_hours:
    morning_start: 09:25
    morning_end: '11:30'
    afternoon_start: '13:00'
    afternoon_end: '15:00'
  health:
    lag_healthy_seconds: 60
    lag_degraded_seconds: 120
    error_healthy_threshold: 10
  sector_heatmap:
    enabled: true
    top_n: 10
    cache_ttl: 60
    scan_timeout: 30
  sector_linkage:
    enabled: true
    top_n: 5
    cache_ttl: 30

# ============================================================================
# 2. alert_templates 段：L1 零件库（告警模板）
# ============================================================================
alert_templates:
  limit_up:
    condition: pct_change > {pct_threshold}
    alert_type: limit_up
    emoji: 🚀
    label: 涨停
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
    description: 触及涨停价（含创业板/科创板 19.5%、北交所 29.5%、主板 9.8%）
    default_params:
      pct_threshold: 0.095
  drop_alert:
    condition: pct_change < -{pct_threshold}
    alert_type: drop_alert
    emoji: ⚠️
    label: 大跌
    channels:
    - websocket
    - feishu
    priority: medium
    description: 跌幅超过 5%（炸板/破位风险）
    default_params:
      pct_threshold: 0.05
  volume_surge:
    condition: volume_ratio > {vol_ratio_threshold}
    alert_type: volume_surge
    emoji: 📈
    label: 放量
    channels:
    - websocket
    priority: low
    description: 量比放大超过 3 倍
    default_params:
      vol_ratio_threshold: 3
  auction_surge:
    condition: auction_pct > {pct_threshold}
    alert_type: auction_surge
    emoji: 🔨
    label: 竞价异动
    channels:
    - websocket
    priority: medium
    description: 开盘竞价涨幅 > 3%（次日确认关键信号）
    default_params:
      pct_threshold: 0.03
  trend_accelerate:
    condition: pct_change > {pct_threshold}
    alert_type: trend_accelerate
    emoji: 🚀
    label: 趋势加速
    channels:
    - tdx_warn
    - websocket
    priority: high
    description: 趋势加速上涨
    default_params:
      pct_threshold: 0.05
  trend_break:
    condition: pct_change < -{pct_threshold}
    alert_type: trend_break
    emoji: 💔
    label: 趋势破位
    channels:
    - websocket
    - feishu
    priority: high
    description: 趋势破位下跌
    default_params:
      pct_threshold: 0.03
  rebound_signal:
    condition: pct_change > {pct_threshold}
    alert_type: rebound_signal
    emoji: 🔄
    label: 反弹信号
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
    description: 错杀反弹启动
    default_params:
      pct_threshold: 0.03
  continue_drop:
    condition: pct_change < -{pct_threshold}
    alert_type: continue_drop
    emoji: 📉
    label: 持续下跌
    channels:
    - websocket
    - feishu
    priority: high
    description: 错杀变深跌，止损信号
    default_params:
      pct_threshold: 0.05
  big_buy_support:
    condition: main_inflow > {inflow_threshold}
    alert_type: big_buy_support
    emoji: 💪
    label: 大单承接
    channels:
    - websocket
    priority: medium
    description: 大单承接（主力净流入 > 1000 万）
    default_params:
      inflow_threshold: 1000
  rzq_ignite:
    condition: pct_change > {pct_threshold}
    alert_type: rzq_ignite
    emoji: ⚡
    label: 弱转强点火
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
    description: 弱转强点火成功
    default_params:
      pct_threshold: 0.03
  rzq_fail:
    condition: pct_change < -{pct_threshold}
    alert_type: rzq_fail
    emoji: 💔
    label: 弱转强失败
    channels:
    - websocket
    - feishu
    priority: high
    description: 弱转强点火失败，止损
    default_params:
      pct_threshold: 0.03
  qzrfc_rebound:
    condition: pct_change > {pct_threshold}
    alert_type: qzrfc_rebound
    emoji: 🔄
    label: 强转弱反抽
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
    description: 强转弱反抽启动
    default_params:
      pct_threshold: 0.02
  qzrfc_fail:
    condition: pct_change < -{pct_threshold}
    alert_type: qzrfc_fail
    emoji: ⚠️
    label: 反抽失败
    channels:
    - websocket
    - feishu
    priority: high
    description: 反抽失败，止损
    default_params:
      pct_threshold: 0.05
  main_self_rescue:
    condition: main_inflow > {inflow_threshold}
    alert_type: main_self_rescue
    emoji: 🆘
    label: 主力自救
    channels:
    - websocket
    priority: medium
    description: 主力自救资金入场
    default_params:
      inflow_threshold: 1000

# ============================================================================
# 3. dedup 段：告警去重配置
# ============================================================================
dedup:
  key_fields:
  - stock_code
  - alert_type
  bypass_priority: high

# ============================================================================
# 4. match_strategies 段：L2 装配单（匹配策略）
# ============================================================================
match_strategies:
- match_id: rzq_default
  name: 弱转强默认监控
  enabled: true
  strategy_id: rzq
  scope:
    markets:
    - SH
    - SZ
    - BJ
    exclude_st: true
    exclude_suspended: true
    exclude_codes: []
    include_only: []
  alerts:
  - alert_type: rzq_ignite
    params:
      pct_threshold: 0.03
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
  - alert_type: rzq_fail
    params:
      pct_threshold: 0.03
    channels:
    - websocket
    - feishu
    priority: high
  - alert_type: volume_surge
    params:
      vol_ratio_threshold: 2
    channels:
    - websocket
    priority: low
  - alert_type: auction_surge
    params: {}
    channels:
    - websocket
    - feishu
    priority: high
  debounce_override: 60
  trading_hours_override: null
- match_id: qzrfc_default
  name: 强转弱反抽监控
  enabled: true
  strategy_id: qzrfc
  scope:
    markets:
    - SH
    - SZ
    exclude_st: true
    exclude_suspended: true
    exclude_codes: []
    include_only: []
  alerts:
  - alert_type: qzrfc_rebound
    params:
      pct_threshold: 0.02
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
  - alert_type: qzrfc_fail
    params:
      pct_threshold: 0.05
    channels:
    - websocket
    - feishu
    priority: high
  debounce_override: 60
  trading_hours_override: null
- match_id: _default
  name: 通用兜底监控
  enabled: true
  strategy_id: ''
  scope: {}
  alerts:
  - alert_type: limit_up
    params:
      pct_threshold: 0.095
    channels:
    - websocket
    - feishu
    priority: high
  - alert_type: drop_alert
    params:
      pct_threshold: 0.05
    channels:
    - websocket
    - feishu
    priority: medium
  debounce_override: null
  trading_hours_override: null
