# TdxQuant Engine 全局应用配置
# 所有路径 / 端口 / 阈值 / URL 都在此处声明，绝不硬编码到代码中
# 修改后调用 POST /api/config/reload 或 scripts/reload_config.py 热加载

app:
  name: TdxQuant Engine
  version: "1.0"
  # 数据适配器模式: mock | real
  # - mock : Linux 沙箱开发/测试，基于 V8 CSV 样本数据
  # - real : Windows 生产环境，调用 tqcenter API
  adapter_mode: mock
  log_level: INFO

server:
  host: 0.0.0.0
  port: 8000

paths:
  # DuckDB 单文件存储路径
  duckdb: ./data/duckdb/quant.db
  # CSV / Excel / 日志导出根目录
  csv_output: ./data/csv
  excel_output: ./data/excel
  logs: ./data/logs
  # 策略 YAML 目录（热加载扫描）
  strategies_dir: ./strategies
  # 监控配置统一入口（Task 2-b：合并 monitor_rules.yaml + match_strategies.yaml）
  # 含 monitor / alert_templates / dedup / match_strategies 4 段
  monitor: ./config/monitor.yaml
  # 通道配置
  channels: ./config/channels.yaml

tqcenter:
  # tqcenter.py 所在目录（Windows 生产环境必填，mock 模式留空即可）
  # 示例: K:\txdlianghua\PYPlugins\user
  # 留空时 RealAdapter 会自动扫描通达信常见安装路径：
  #   C:\new_tdx / D:\new_tdx / K:\txdlianghua 等下的 PYPlugins\user 或 T0002\hq_cache\PythonLib
  # 也可用环境变量 TQ_CENTER_PATH 覆盖
  python_path: ""
  # tq.initialize(path) 入参
  # - 留 "__file__" 占位符：代码自动用 python_path/tqcenter.py（推荐）
  # - 或配绝对路径：如 K:\txdlianghua\PYPlugins\user\tqcenter.py
  # 也可用环境变量 TQ_CENTER_INITIALIZE 覆盖
  initialize_file: __file__
  # subscribe_hq 单次最多 100 只，分批 50（可配置）
  subscribe_batch_size: 50
  # get_market_data 单次最大 K 线条数，超出自动分批续传
  kline_max_count: 24000
  # R14-2: 适配器层令牌桶（保护终端 GUI 线程，Real 模式生效）
  # - Mock 模式下 mock_adapter 不调 acquire_or_skip，故本配置不生效（开发体验优先）
  # - 配置变更通过 POST /api/config/reload 热加载（reset_limiter 重建）
  global_qps: 10
  burst: 20
  acquire_timeout: 5

# R14-3: 板块热度 + 同板块联动开关的实际配置在 config/monitor.yaml 的 monitor 段下
# （ConfigLoader 按 alphabetical 加载 yaml，monitor.yaml 后于 app.yaml 加载，
#  故 monitor.* 配置统一放在 monitor.yaml，避免被覆盖）
# 修改后调 POST /api/config/reload 热加载，前端按 enabled 字段决定是否显示

# R14-2: FastAPI 端点限流（Mock/Real 都生效，保护 Next 代理层 CPU）
api:
  rate_limit:
    enabled: true
    rules:
      # /health 是 FastAPI 根健康端点；/api/monitor/health 是引擎健康度（前端高频轮询）
      - path_prefix: "/health"
        qpm: 120
      - path_prefix: "/api/monitor/health"
        qpm: 120
      # 个股板块归属（hover 高频，缓存兜底）
      - path_prefix: "/api/stocks"
        qpm: 30
      # 板块查询 GET 宽松，POST refresh 重操作严格
      - path_prefix: "/api/sectors"
        qpm: 60
        methods: ["GET"]
      - path_prefix: "/api/sectors"
        qpm: 3
        methods: ["POST"]
      # 监控/信号常规轮询
      - path_prefix: "/api/monitor"
        qpm: 60
      - path_prefix: "/api/signals"
        qpm: 60
    default_qpm: 60
    cleanup_interval: 300

mock:
  # Mock 适配器读取 V8 CSV 样本数据的目录
  data_dir: ./data/v8-samples/data
  # Mock subscribe_hq 模拟推送间隔（秒）
  push_interval: 3
