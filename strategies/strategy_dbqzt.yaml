strategy_id: dbqzt
strategy_name: 打板求涨停
strategy_emoji: 🔥
version: '1.0'
enabled: true
sector:
  code: ZD_DBQZT01
  name: 打板求涨停选股
  auto_update: true
  update_mode: replace
universe:
  exclude_st: true
  exclude_suspended: true
  exclude_new_listing_days: 5
  market_list:
  - SH
  - SZ
  - BJ
  exclude_codes: []
  include_only: []
  next_day_confirm: "总分<35 跳过；否则按连板数 fLianB 分支:\n  fLianB>=3: 竞价不低开(>0%)+竞价量放大\n \
    \ 涨停 & FCb>=0.2: 竞价涨幅>1.5%+不低开\n  涨停 & FCb>0: 竞价涨幅>2%+量比>1.5\n  涨停(其他): 竞价涨幅>2%+量比>1.5\n\
    \  非涨停: 竞价涨幅>3%+量比>2+5分钟涨>2%\n  fLianB>=5 且 FCb<0.1: ⚠封板弱若低开放弃入场\n"
pool:
  expression: is_limit_up or ZAF >= 7
  description: 涨停股 OR 当日涨幅≥7%
cleaning:
  rules_file: cleaning_rules.yaml
  custom_rules: []
factors:
- factor_id: seal_ratio
  weight: 1.0
  params:
    field: FCb
    clip_min: 0.0
- factor_id: seal_amount
  weight: 1.0
  params:
    field: FCAmo
    clip_min: 0.0
- factor_id: seal_strength
  weight: 1.0
  params:
    field: 封板强度系数
- factor_id: consecutive_limit
  weight: 1.0
  params:
    field: fLianB
    zt_field: 是否涨停
- factor_id: volume_ratio
  weight: 0.0
  params:
    field: Wtb
    invalid_to_nan: true
scoring:
  formula: clip((consecutive_limit>=1)*10 + (seal_ratio>=0.5)*20 + (seal_ratio>=0.2
    and seal_ratio<0.5)*14 + (seal_ratio>=0.05 and seal_ratio<0.2)*8 + (seal_ratio>0
    and seal_ratio<0.05)*3 + (seal_amount>=30000)*10 + (seal_amount>=10000 and seal_amount<30000)*8
    + (seal_amount>=5000 and seal_amount<10000)*5 + (seal_amount>=1000 and seal_amount<5000)*2
    + (seal_strength>=2)*5 + (seal_strength>=1.5 and seal_strength<2)*3, 0, 40) +
    clip((consecutive_limit>=7)*30 + (consecutive_limit>=5 and consecutive_limit<7)*26
    + (consecutive_limit>=4 and consecutive_limit<5)*22 + (consecutive_limit==3)*18
    + (consecutive_limit==2)*12 + (consecutive_limit==1)*6, 0, 30) + clip(0, 0, 20)
    + clip(0, -10, 0)
  normalization: none
  penalties:
  - condition: consecutive_limit < 1 and seal_ratio == 0
    multiplier: 0.5
    reason: 弱股减半（未涨停 + 封成比0 + 无连板）
output:
  top_n: 30
  min_score: 15
  sort_by: total_score
  sort_order: desc
monitor:
  enabled: true
  subscribe_hq: true
  batch_size: 50
  alert_conditions:
  - condition: pct_change > 0.095
    alert_type: limit_up
    channels:
    - tdx_warn
    - websocket
    - feishu
    priority: high
  - condition: pct_change < -0.05
    alert_type: drop_alert
    channels:
    - websocket
    - feishu
    priority: medium
  - condition: auction_pct > 0.03
    alert_type: auction_surge
    channels:
    - websocket
    priority: medium
export:
  csv: true
  excel: true
  excel_sheet_name: 🔥打板求涨停
  duckdb: true
  sector: true
